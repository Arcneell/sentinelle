name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dépendances système (Qt en mode hors-écran)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0 libfontconfig1

      - name: Dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-server.txt pytest httpx

      - name: Compilation (syntaxe)
        run: python -m compileall sentinelle sentinelle_server run.py

      - name: Tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q
