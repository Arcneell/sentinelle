name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# lecture seule par défaut : un step compromis n'obtient pas d'accès en écriture
# au dépôt (le jeton hérite sinon des permissions par défaut du dépôt).
permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 = plancher annoncé (README) ; 3.14 = image du serveur (Docker)
        python-version: ["3.11", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Dépendances système (Qt en mode hors-écran)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0 libfontconfig1

      - name: Dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-server.txt pytest httpx ruff

      - name: Lint (erreurs réelles uniquement)
        # ne bloque que sur les vraies erreurs (syntaxe, noms indéfinis, f-strings
        # cassées…) — pas sur le style, pour ne pas être bruyant.
        run: ruff check --select E9,F63,F7,F82 sentinelle sentinelle_server run.py

      - name: Compilation (syntaxe)
        run: python -m compileall sentinelle sentinelle_server run.py

      - name: Tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

  # Paquet Debian : construit le .deb sur trixie (la cible des postes muraux)
  # et vérifie qu'il s'installe et démarre avec ses SEULS Depends — les
  # régressions de packaging n'étaient détectées que chez le client.
  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Construire le .deb (Debian 13)
        run: |
          mkdir -p dist
          docker run --rm -v "$PWD:/src" -w /src debian:13 \
            bash packaging/build_deb.sh

      - name: Installer et fumer (Depends seuls, sans Recommends)
        run: |
          docker run --rm -v "$PWD/dist:/dist" debian:13 bash -ec '
            set -o pipefail
            apt-get update
            apt-get install -y --no-install-recommends /dist/*.deb
            # le plugin xcb doit être embarqué ET trouver ses bibliothèques système
            XCB=$(find /opt/sentinelle -name libqxcb.so | head -1)
            test -n "$XCB"
            ldd "$XCB" | (! grep "not found")
            # la pile vidéo ne doit JAMAIS être embarquée : une libmpv/libva du
            # bundle masque celles du système et casse VA-API (tuiles noires)
            test -z "$(find /opt/sentinelle -name "libmpv.so*" -o -name "libva.so*" -o -name "libavcodec.so*")"
            # --help traverse le bootloader PyInstaller + argparse sans écran
            /opt/sentinelle/sentinelle --help
            # démarrage réel de Qt : atteindre la boucle d événements (124 = timeout)
            timeout 15 env QT_QPA_PLATFORM=offscreen /opt/sentinelle/sentinelle || test $? -eq 124
          '

  # Agrégateur : c'est LE check requis par la protection de branche (contexte
  # « test », aussi attendu par l'auto-merge Dependabot). Il n'est vert que si
  # toute la matrice l'est ; `if: always()` l'empêche d'être « skipped » quand
  # la matrice échoue (un check requis sauté passerait pour réussi).
  test:
    needs: [tests, deb]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Vérifie que la matrice est verte
        run: |
          test "${{ needs.tests.result }}" = "success"
          test "${{ needs.deb.result }}" = "success"
